<!DOCTYPE html>
<!--!Informa al navegador que version de HTML se uso para escribir el documento Doctype es una declaracion no una etiqueta-->
<html lang="en"> <!--!Indica el idioma del documento HTML-->

<head> <!--!Indica la cabecera del documento-->
    <meta charset="UTF-8"> <!--!Indica el tipo de caracteres a decodificar-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--!Ayudan al documento cuando se hara responsivo, siempre debe llevarlo-->
    <title>Document</title> <!--!Indica el titulo o nombre del website a mostrar en el navegador-->
    <link rel="stylesheet" type="text/css" href="">
    <!--!Indica que se enlazara un documento externo para estilos de la pagina-->
</head>

<body> <!--!indica el cuerpo del documento-->
    <h1>Hola Mundo</h1>
</body>

</html>
